<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiosk Welcome Screen</title>
    <style>
        /* Reset and prevent scrolling */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a; /* Deep slate background matching the app */
        }

        /* Full-screen video container */
        #bgVideo {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Crops video to fill screen without distortion */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Subtle techy overlay (Vignette) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(15, 23, 42, 0.8) 150%);
            z-index: 2;
            pointer-events: none;
        }

        /* Redesigned Instruction Container with Background */
        .instruction-wrapper {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .instruction-pill {
            /* Frosted Glass Effect for high visibility */
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            
            padding: 24px 60px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            
            animation: float 4s infinite ease-in-out;
        }

        .instruction-text {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-align: center;
            white-space: nowrap;
        }

        .sub-text {
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #94a3b8;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            opacity: 0.8;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6); }
            50% { transform: translateY(-10px); box-shadow: 0 35px 70px rgba(0, 0, 0, 0.7); }
        }
    </style>
</head>
<body>

    <video id="bgVideo" muted loop playsinline preload="auto">
        <source src="welcome_video.webm" type="video/webm">
        <source src="welcome_video.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="instruction-wrapper">
        <div class="instruction-pill">
            <div class="instruction-text">Please place one tile in each slot</div>
            <div class="sub-text">Initialization Required</div>
        </div>
    </div>

    <script>
        /**
         * FAIL-SAFE VIDEO INITIALIZATION
         * Chromium inside PyQt can be aggressive with autoplay blocking.
         * This script forces a "play" command until successful.
         */
        const video = document.getElementById('bgVideo');

        function forcePlay() {
            video.play().then(() => {
                console.log("Video playback started successfully.");
            }).catch(err => {
                // If blocked by the engine, wait 500ms and try again
                console.log("Playback pending engine ready...");
                setTimeout(forcePlay, 500);
            });
        }

        // Start attempt immediately on window load
        window.addEventListener('load', forcePlay);

        // Backup: Re-attempt if the video is ever paused (unexpectedly)
        video.addEventListener('pause', () => {
            if (video.readyState >= 2) {
                forcePlay();
            }
        });
        
        /**
         * APP COMPATIBILITY
         * We include an empty releaseDashboard function so the Python 
         * side's QTimer doesn't log a 'function not found' error.
         */
        window.releaseDashboard = function() {
            console.log("Welcome screen active.");
        };

        /**
         * GPU HEARTBEAT
         * Creating a tiny, invisible moving pixel to keep the GPU 
         * active and prevent the "frame-per-keypress" freeze.
         */
        const dummyCanvas = document.createElement('canvas');
        dummyCanvas.width = dummyCanvas.height = 1;
        dummyCanvas.style.position = 'fixed';
        dummyCanvas.style.opacity = '0.01';
        document.body.appendChild(dummyCanvas);
        const dtx = dummyCanvas.getContext('2d');
        
        function keepAlive() {
            dtx.clearRect(0, 0, 1, 1);
            dtx.fillRect(0, 0, 1, 1);
            requestAnimationFrame(keepAlive);
        }
        keepAlive();
    </script>
</body>
</html>
